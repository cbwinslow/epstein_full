name: Welcome

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: >
            Thanks for opening your first issue! Please make sure you've checked
            [TASKS.md](https://github.com/cbwinslow/epstein_full/blob/main/TASKS.md)
            for existing work and [docs/ARCHITECTURE.md](https://github.com/cbwinslow/epstein_full/blob/main/docs/ARCHITECTURE.md)
            for the system overview.
          pr-message: >
            Thanks for your first PR! Please make sure tests pass and you've
            filled out the PR template. A maintainer will review shortly.
