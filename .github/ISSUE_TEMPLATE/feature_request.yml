name: Feature Request
description: Propose a new feature, tool, or enhancement
title: "[FEATURE] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the feature you'd like to see. Link to relevant issues or docs if applicable.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-line description of the feature
      placeholder: "e.g. Add vector similarity search for document pages"
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this feature needed? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: How should this be implemented? Include technical details if possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you've considered

  - type: dropdown
    id: phase
    attributes:
      label: Project Phase
      options:
        - Phase 9: Processing Pipeline
        - Phase 10: Analysis & Paper
        - Infrastructure / CI/CD
        - Documentation
        - Other

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low (nice to have)
        - Medium (would improve workflow)
        - High (blocking progress)
    validations:
      required: true
