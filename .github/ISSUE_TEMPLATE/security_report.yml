name: Security Report
description: Report a security vulnerability (credentials, exposed data, access issues)
title: "[SECURITY] "
labels: ["security", "priority: critical"]
body:
  - type: markdown
    attributes:
      value: |
        ⚠️ **If this is a critical vulnerability, do not open a public issue.** Contact the maintainer directly.

  - type: dropdown
    id: type
    attributes:
      label: Vulnerability Type
      options:
        - Hardcoded credentials
        - Exposed API keys/tokens
        - Insecure file permissions
        - Missing access controls
        - Dependency vulnerability
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the vulnerability and its location (file:line)
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: What is the potential impact? (data exposure, unauthorized access, etc.)
    validations:
      required: true

  - type: textarea
    id: remediation
    attributes:
      label: Suggested Remediation
      description: How should this be fixed?
    validations:
      required: true
