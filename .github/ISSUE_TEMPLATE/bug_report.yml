name: Bug Report
description: Report a bug in the pipeline, scripts, or infrastructure
title: "[BUG] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below so we can reproduce and fix it.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-line description of the bug
      placeholder: "e.g. download_cdn.py crashes on 403 response"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Exact commands and inputs to reproduce the bug
      value: |
        1. Run `python scripts/download_cdn.py --datasets 9`
        2. Wait for...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include full error messages and tracebacks.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        - OS:
        - Python version:
        - Node version:
        - PostgreSQL version:
        - CUDA/GPU:
        - Branch/commit:
      render: text

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Low (cosmetic, workaround exists)
        - Medium (broken feature, workaround exists)
        - High (broken feature, no workaround)
        - Critical (data loss, security issue, system down)
    validations:
      required: true
