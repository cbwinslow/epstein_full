# SonarQube Cloud Configuration for Epstein Project
# https://sonarcloud.io/

# Project identification
sonar.projectKey=cbwinslow_epstein
sonar.organization=cbwinslow
sonar.host.url=https://sonarcloud.io

# Project metadata
sonar.projectName=Epstein Files Analysis
sonar.projectVersion=1.0
sonar.projectDescription=Data analysis platform for Epstein Files investigation

# Source code
sonar.sources=.
sonar.exclusions=\
  **/tests/**,\
  **/node_modules/**,\
  **/.git/**,\
  **/venv/**,\
  **/__pycache__/**,\
  **/data/**,\
  **/downloads/**,\
  **/.archive/**,\
  **/uv.lock,\
  **/logs/**,\
  **/epstein-data/**,\
  **/Epstein-Pipeline/**,\
  **/Epstein-research-data/**

# Test sources
sonar.tests=tests
sonar.test.inclusions=**/test_*.py,**/*_test.py,**/tests/**/*.py

# Python specific
sonar.python.version=3.12
sonar.python.coverage.reportPaths=coverage.xml

# Coverage exclusions (don't count these in coverage metrics)
sonar.coverage.exclusions=\
  **/tests/**,\
  scripts/archive/**,\
  scripts/migrations/**,\
  **/conftest.py

# Duplicate code exclusions (data ingestion scripts often have similar patterns)
sonar.cpd.exclusions=\
  scripts/ingestion/**/*.py

# Encoding
sonar.sourceEncoding=UTF-8

# SCM
sonar.scm.provider=git

# Analysis settings
sonar.verbose=false
sonar.log.level=INFO
