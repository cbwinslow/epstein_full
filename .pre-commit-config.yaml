repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: debug-statements
      - id: mixed-line-ending
      - id: requirements-txt-fixer

  # Ruff: replaces Black + isort + flake8 + pydocstyle
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.1
    hooks:
      - id: mypy
        additional_dependencies:
          - types-requests
          - types-psycopg2
          - types-python-dateutil
          - pydantic
        args: ['--ignore-missing-imports']

  # Security: Bandit for Python security issues
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml"]
        additional_dependencies: ["bandit[toml]"]
        # Skip test files and scripts that intentionally use exec/eval
        exclude: |
          (?x)^(
            tests/.*|
            scripts/archive/.*
          )$

  # SQL linting
  - repo: https://github.com/sqlfluff/sqlfluff
    rev: 4.1.0
    hooks:
      - id: sqlfluff-lint
        args: [--dialect, postgres]
        files: \.(sql)$

  # Local hooks - run tests on commit
  - repo: local
    hooks:
      - id: pytest-check
        name: pytest-check
        entry: pytest tests/unit -v --tb=short -x -q
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
